<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenSMS OTP Widget Demo</title>
    <script src="/opensms-otp-widget.js" defer></script>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #ddeff2;
        color: #050814;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(100% - 32px, 980px);
        display: grid;
        grid-template-columns: minmax(0, 390px) minmax(0, 1fr);
        gap: 44px;
        align-items: start;
      }
      h1 {
        margin: 0;
        font-size: 34px;
        letter-spacing: -0.05em;
      }
      p {
        color: #667085;
        line-height: 1.7;
      }
      code {
        border-radius: 10px;
        background: #e8f5fb;
        padding: 2px 7px;
        color: #24aee4;
      }
      pre {
        min-height: 220px;
        overflow: auto;
        border: 1px solid rgba(5, 8, 20, 0.1);
        border-radius: 18px;
        background: white;
        padding: 16px;
        color: #344054;
        font-size: 13px;
        line-height: 1.6;
      }
      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <opensms-otp-widget
          start-url="/demo/otp/start"
          verify-url="/demo/otp/verify"
          brand="OpenSMS Demo"
          purpose="login"
          environment="sandbox"
          logo-url="/favicon.svg"
          accent-color="#24AEE4"
          resend-seconds="10">
        </opensms-otp-widget>
      </section>
      <section>
        <h1>OTP Widget Demo</h1>
        <p>
          This page mocks the customer's backend proxy. Use any valid phone number,
          then verify with <code>123456</code>. No OpenSMS API key is present in
          browser code or browser network requests.
        </p>
        <pre id="events">Waiting for widget events...</pre>
      </section>
    </main>

    <script>
      const originalFetch = window.fetch.bind(window);
      window.fetch = async function (url, options) {
        if (String(url).endsWith("/demo/otp/start")) {
          return new Response(JSON.stringify({
            otp_id: "demo_" + Date.now(),
            expires_at: new Date(Date.now() + 300000).toISOString()
          }), { status: 200, headers: { "Content-Type": "application/json" } });
        }
        if (String(url).endsWith("/demo/otp/verify")) {
          const body = JSON.parse(options && options.body ? options.body : "{}");
          if (body.code === "123456") {
            return new Response(JSON.stringify({
              status: "verified",
              verified_at: new Date().toISOString()
            }), { status: 200, headers: { "Content-Type": "application/json" } });
          }
          return new Response(JSON.stringify({
            status: "failed",
            message: "Use 123456 for this mock demo."
          }), { status: 400, headers: { "Content-Type": "application/json" } });
        }
        return originalFetch(url, options);
      };

      const events = document.getElementById("events");
      function logEvent(event) {
        events.textContent = JSON.stringify({
          type: event.type,
          detail: event.detail
        }, null, 2) + "\n\n" + events.textContent;
      }
      document.addEventListener("opensms:otp-sent", logEvent);
      document.addEventListener("opensms:otp-verified", logEvent);
      document.addEventListener("opensms:otp-error", logEvent);
    </script>
  </body>
</html>
